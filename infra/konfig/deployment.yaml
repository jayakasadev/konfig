apiVersion: apps/v1
kind: Deployment
metadata:
  name: konfig
  namespace: konfig-system
spec:
  # 1 replica for load testing (per project rule); HA deploys override via Helm.
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: konfig
  template:
    metadata:
      labels:
        app: konfig
    spec:
      serviceAccountName: konfig
      affinity:
        podAntiAffinity:
          # Preferred (not required) so this works on single-node kind clusters.
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: konfig
                topologyKey: kubernetes.io/hostname
      containers:
        - name: konfig
          # Tag is rewritten to the merged-commit short SHA by
          # .github/workflows/publish-images.yml on every push to main.
          image: kasa288/konfig:latest
          args:
            - --grpc-addr=0.0.0.0:50051
            - --metrics-addr=0.0.0.0:9090
            - --namespace=$(KONFIG_NAMESPACE)
            - --name=$(KONFIG_NAME)
            - --secret-namespaces=konfig-system
          env:
            - name: KONFIG_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: konfig-config
                  key: namespace
            - name: KONFIG_NAME
              valueFrom:
                configMapKeyRef:
                  name: konfig-config
                  key: name
          ports:
            - name: grpc
              containerPort: 50051
            - name: metrics
              containerPort: 9090
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            grpc:
              port: 50051
              service: konfig.v1.KonfigService
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            grpc:
              port: 50051
              service: konfig.v1.KonfigService
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
