apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: konfig-secret-access
  namespace: konfig-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    # patch + create needed for ApplySecret (server-side apply).
    verbs: ["get", "list", "watch", "patch", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: konfig-secret-access
  namespace: konfig-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: konfig-secret-access
subjects:
  - kind: ServiceAccount
    name: konfig
    namespace: konfig-system
