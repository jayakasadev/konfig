apiVersion: batch/v1
kind: Job
metadata:
  name: konfig-loadtest-backpressure
  namespace: konfig-system
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: konfig-loadtest
          image: kasa288/konfig-loadtest:latest
          imagePullPolicy: Always
          args:
            - --addr
            - http://konfig.konfig-system.svc.cluster.local:50051
            - --namespace
            - konfig-system
            - --config-name
            - konfig-loadtest
            - --secret-name
            - konfig-loadtest-secret
          env:
            # Many slow subscribers + tight apply cadence — force server-side
            # send buffers to fill faster than streams drain, exercising h2
            # flow-control windows and tonic backpressure paths.
            - name: S1_SUBSCRIBERS
              value: "500"
            - name: S1_APPLIES
              value: "2000"
            - name: S1_INTERVAL_MS
              value: "2"
          resources:
            requests:
              cpu: "2"
              memory: 1Gi
            limits:
              cpu: "6"
              memory: 1536Mi
