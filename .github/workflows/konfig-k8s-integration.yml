name: Konfig K8s Integration Tests
on:
  push:
    branches: [main]
    paths:
      - 'rust/konfig/**'
      - 'proto/konfig/**'
      - 'infra/konfig/**'
      - 'tools/konfig-cli/**'
      - '.github/workflows/konfig-k8s-integration.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  k8s-integration:
    name: All integration tests (Testcontainers K3s)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BB_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: bazelbuild/setup-bazelisk@v3

      - name: Install protoc
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q protobuf-compiler

      - name: Configure Bazel for CI (BuildBuddy remote cache)
        run: |
          cat > .bazelrc.user << EOF
          common --config=ci
          common --remote_cache=grpcs://remote.buildbuddy.io
          common --remote_header=x-buildbuddy-api-key=$BB_API_KEY
          build --build_metadata=BRANCH_NAME=${{ github.ref_name }}
          build --build_metadata=COMMIT_SHA=${{ github.sha }}
          build --build_metadata=REPO_URL=https://github.com/jayakasadev/konfig
          EOF

      - name: Run all konfig integration tests
        run: |
          bazel test //rust/konfig:all \
            --test_tag_filters=integration \
            --test_output=streamed \
            --test_env=RUST_LOG=konfig=debug,kube=info \
            --test_env=TESTCONTAINERS_RYUK_DISABLED=false
