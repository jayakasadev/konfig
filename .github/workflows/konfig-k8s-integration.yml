name: Konfig K8s Integration Tests
# Runs ALL konfig integration tests (files matching tests/integration_*.rs) using
# Testcontainers (K3s in Docker).  No external kind cluster or kubectl context is
# required — each test spins up its own K3s container and tears it down.
# Triggered on every PR that touches rust/konfig/, schema/konfig/, or this file.
on:
  pull_request:
    branches: [main]
    paths:
      - 'rust/konfig/**'
      - 'schema/konfig/**'
      - '.github/workflows/konfig-k8s-integration.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  k8s-integration:
    name: All integration tests (Testcontainers K3s)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Restore Cargo registry + compiled deps to keep the job fast.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
            target
          key: cargo-konfig-k8s-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-konfig-k8s-

      # Run ALL integration tests with the `integration` feature enabled.
      # Testcontainers pulls and starts a K3s container automatically — Docker is
      # pre-installed on blacksmith runners so no extra setup is needed.
      #
      # Omitting `--test <name>` causes `cargo test` to discover and run every
      # [[test]] target in Cargo.toml that has `required-features = ["integration"]`.
      # New test files added in future phases (Phase 2A gRPC, Phase 2B watch stream,
      # etc.) are picked up automatically — no workflow change required.
      - name: Run all konfig integration tests
        run: |
          cargo test \
            --features integration \
            -p konfig \
            -- --nocapture
        env:
          RUST_LOG: konfig=debug,kube=info
          # Testcontainers respects TESTCONTAINERS_RYUK_DISABLED for environments
          # where the Ryuk reaper container is not permitted.
          TESTCONTAINERS_RYUK_DISABLED: "false"
