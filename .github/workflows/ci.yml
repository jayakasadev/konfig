name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BB_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: bazelbuild/setup-bazelisk@v3

      - name: Install protoc
        run: sudo apt-get update -q && sudo apt-get install -y -q protobuf-compiler

      - name: Configure Bazel for CI (BuildBuddy remote cache)
        run: |
          cat > .bazelrc.user << EOF
          common --config=ci
          common --remote_cache=grpcs://remote.buildbuddy.io
          common --remote_header=x-buildbuddy-api-key=$BB_API_KEY
          build --build_metadata=BRANCH_NAME=${{ github.ref_name }}
          build --build_metadata=COMMIT_SHA=${{ github.sha }}
          build --build_metadata=REPO_URL=https://github.com/jayakasadev/konfig
          EOF

      - name: Build
        run: bazel build //rust/konfig:konfig_bin //tools/konfig-cli:konfig_cli

      - name: Test
        run: bazel test //rust/konfig:test //tools/konfig-cli/... --test_output=errors

      - name: Format
        run: bazel test //rust/konfig:fmt_test //tools/konfig-cli:fmt_test

      - name: Clippy
        run: bazel build //rust/konfig:clippy_test //tools/konfig-cli:clippy_test

  integration-tests:
    name: Integration tests (K3s)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
    env:
      BB_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: bazelbuild/setup-bazelisk@v3

      - name: Install protoc
        run: sudo apt-get update -q && sudo apt-get install -y -q protobuf-compiler

      - name: Configure Bazel for CI (BuildBuddy remote cache)
        run: |
          cat > .bazelrc.user << EOF
          common --config=ci
          common --remote_cache=grpcs://remote.buildbuddy.io
          common --remote_header=x-buildbuddy-api-key=$BB_API_KEY
          build --build_metadata=BRANCH_NAME=${{ github.ref_name }}
          build --build_metadata=COMMIT_SHA=${{ github.sha }}
          build --build_metadata=REPO_URL=https://github.com/jayakasadev/konfig
          EOF

      - name: Run integration tests
        run: |
          bazel test //rust/konfig:all \
            --test_tag_filters=integration \
            --test_output=streamed \
            --test_env=RUST_LOG=konfig=debug,kube=info \
            --test_env=TESTCONTAINERS_RYUK_DISABLED=false
