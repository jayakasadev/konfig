name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    env:
      BB_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: bazelbuild/setup-bazelisk@v3

      - name: Install protoc
        run: sudo apt-get update -q && sudo apt-get install -y -q protobuf-compiler

      - name: Configure Bazel for CI (BuildBuddy remote cache)
        run: |
          cat > .bazelrc.user << EOF
          common --config=ci
          common --remote_cache=grpcs://remote.buildbuddy.io
          common --remote_header=x-buildbuddy-api-key=$BB_API_KEY
          build --build_metadata=BRANCH_NAME=${{ github.ref_name }}
          build --build_metadata=COMMIT_SHA=${{ github.sha }}
          build --build_metadata=REPO_URL=https://github.com/jayakasadev/konfig
          EOF

      - name: Build
        run: bazel build //rust/konfig:konfig_bin //tools/konfig-cli:konfig_cli

      - name: Test
        run: bazel test //rust/konfig:test //tools/konfig-cli:... --test_output=errors

      - name: Clippy
        run: bazel test //rust/konfig:clippy_test //tools/konfig-cli:clippy_test

  integration-tests:
    name: Integration tests (K3s)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-integration')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update -q && sudo apt-get install -y -q protobuf-compiler

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
            target
          key: cargo-konfig-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-konfig-

      - name: Run integration tests
        run: |
          cargo test -p konfig \
            --features integration \
            -- --nocapture --test-threads=1
        env:
          RUST_LOG: konfig=debug,kube=info
          TESTCONTAINERS_RYUK_DISABLED: "false"
