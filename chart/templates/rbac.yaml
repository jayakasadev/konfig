{{- if .Values.rbac.createConfigRole }}
# ClusterRole: get/list/watch/patch/create on configs.konfig.io (all namespaces).
# ClusterRoleBinding is safe here — Config CRDs are non-sensitive operator data.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "konfig.fullname" . }}-config-access
  labels:
    {{- include "konfig.labels" . | nindent 4 }}
rules:
  - apiGroups: ["konfig.io"]
    resources: ["configs"]
    verbs: ["get", "list", "watch", "patch", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "konfig.fullname" . }}-config-access
  labels:
    {{- include "konfig.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "konfig.fullname" . }}-config-access
subjects:
  - kind: ServiceAccount
    name: {{ include "konfig.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}

{{- if .Values.rbac.createConfigMapRole }}
---
# ClusterRole: get/list/watch labeled ConfigMaps across all namespaces.
# Separate from the Config CRD role — disable independently if ConfigMap
# watching is not needed (konfig.watchConfigMaps=false).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "konfig.fullname" . }}-configmap-access
  labels:
    {{- include "konfig.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "konfig.fullname" . }}-configmap-access
  labels:
    {{- include "konfig.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "konfig.fullname" . }}-configmap-access
subjects:
  - kind: ServiceAccount
    name: {{ include "konfig.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}

{{- if and .Values.rbac.createSecretRole .Values.konfig.secretNamespaces }}
{{- $sa := include "konfig.serviceAccountName" . }}
{{- $ns := .Release.Namespace }}
{{- $fullname := include "konfig.fullname" . }}
{{- range $idx, $secretNs := (splitList "," .Values.konfig.secretNamespaces) }}
{{- $secretNs = trim $secretNs }}
{{- if $secretNs }}
---
# Role + RoleBinding for Secrets in {{ $secretNs }}.
# NEVER ClusterRoleBinding for Secrets — namespace-scoped by design (ADR-005).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullname }}-secret-access
  namespace: {{ $secretNs }}
  labels:
    app.kubernetes.io/name: {{ $fullname }}
    app.kubernetes.io/managed-by: Helm
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullname }}-secret-access
  namespace: {{ $secretNs }}
  labels:
    app.kubernetes.io/name: {{ $fullname }}
    app.kubernetes.io/managed-by: Helm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullname }}-secret-access
subjects:
  - kind: ServiceAccount
    name: {{ $sa }}
    namespace: {{ $ns }}
{{- end }}
{{- end }}
{{- end }}
