apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "konfig.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "konfig.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "konfig.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "konfig.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "konfig.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: konfig
          image: {{ include "konfig.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - --grpc-addr=0.0.0.0:{{ .Values.service.grpcPort }}
            - --metrics-addr=0.0.0.0:{{ .Values.service.metricsPort }}
            - --namespace=$(KONFIG_NAMESPACE)
            - --name=$(KONFIG_NAME)
            {{- if .Values.konfig.watchConfigMaps }}
            - --watch-configmaps
            {{- end }}
            {{- if .Values.konfig.secretNamespaces }}
            - --secret-namespaces={{ .Values.konfig.secretNamespaces }}
            {{- end }}
          env:
            - name: KONFIG_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "konfig.fullname" . }}-config
                  key: namespace
            - name: KONFIG_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "konfig.fullname" . }}-config
                  key: name
            {{- if .Values.telemetry.dial9.enabled }}
            - name: DIAL9_ENABLED
              value: "true"
            - name: DIAL9_TRACE_DIR
              value: {{ .Values.telemetry.dial9.traceDir | quote }}
            - name: DIAL9_MAX_DISK_USAGE_MB
              value: {{ .Values.telemetry.dial9.maxDiskUsageMb | quote }}
            - name: DIAL9_ROTATION_SECS
              value: {{ .Values.telemetry.dial9.rotationSecs | quote }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
              protocol: TCP
            {{- if .Values.telemetry.tokioConsole.enabled }}
            - name: tokio-console
              containerPort: {{ .Values.telemetry.tokioConsole.port }}
              protocol: TCP
            {{- end }}
          readinessProbe:
            grpc:
              port: {{ .Values.service.grpcPort }}
              service: konfig.v1.KonfigService
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          livenessProbe:
            grpc:
              port: {{ .Values.service.grpcPort }}
              service: konfig.v1.KonfigService
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
