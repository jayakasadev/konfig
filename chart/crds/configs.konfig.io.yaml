apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: configs.konfig.io
  annotations:
    # Applied before all other resources so the CRD is established before the
    # Deployment starts. Helm 3 applies crds/ before templates/ automatically.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  group: konfig.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - schema_version
              properties:
                schema_version:
                  type: integer
                  minimum: 0
                  description: >
                    Monotonically increasing version counter.
                    The Apply RPC rejects any value ≤ the current stored version,
                    ensuring writes are linearizable and stale clients can't overwrite
                    newer config.
                content:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  description: >
                    Arbitrary configuration payload — any valid JSON/YAML object.
                    Konfig stores and streams this opaque blob; validation is the
                    consumer's responsibility.
  scope: Namespaced
  names:
    plural: configs
    singular: config
    kind: Config
    shortNames:
      - cfg
