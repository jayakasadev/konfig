syntax = "proto3";

package konfig.v1;

option java_package = "io.konfig.v1";
option go_package = "konfig.io/v1";

// Generic config stored in a Config CRD.
message Config {
  string namespace = 1;
  string name = 2;
  uint32 schema_version = 3;
  // JSON-encoded content — arbitrary structure defined by the consumer.
  string content_json = 4;
  string resource_version = 5;
  // Milliseconds since the snapshot was loaded into the cache.
  int64 age_ms = 6;
  // Milliseconds since the watcher lost its K8s connection. -1 when fresh.
  int64 stale_since_ms = 7;
}

message GetRequest {
  string namespace = 1;
  string name = 2;
}

message GetAllRequest {
  string namespace = 1;
}

message ApplyRequest {
  string namespace = 1;
  string name = 2;
  // Full config as YAML. Must contain a top-level `schema_version` key.
  string yaml_content = 3;
}

message ApplyResponse {
  string resource_version = 1;
}

message RevertRequest {
  string namespace = 1;
  string name = 2;
  // The resourceVersion of the historical Config to roll back to.
  string to_resource_version = 3;
}

message RevertResponse {
  string resource_version = 1;
  uint32 schema_version = 2;
}

message SubscribeRequest {
  string namespace = 1;
  repeated string names = 2;
  // Resume from this resourceVersion (empty = start from current).
  string resume_resource_version = 3;
}

message ConfigEvent {
  enum EventType {
    ADDED = 0;
    MODIFIED = 1;
    DELETED = 2;
    // Initial-state event emitted synchronously on Subscribe with empty
    // resume_resource_version. Distinguishes the cold-start replay from
    // subsequent MODIFIED events so clients can opt-in to differentiate.
    SNAPSHOT = 3;
  }
  EventType event_type = 1;
  Config config = 2;
}

message GetSecretRequest {
  string namespace = 1;
  string name = 2;
}

message SecretResponse {
  string namespace = 1;
  string name = 2;
  uint32 schema_version = 3;
  // JSON map: {"key": "<base64_value>"}. Values are NOT decoded server-side.
  string data_json = 4;
  string resource_version = 5;
  int64 age_ms = 6;
}

message GetAllSecretsRequest {
  string namespace = 1;
}

message ApplySecretRequest {
  string namespace = 1;
  string name = 2;
  // YAML map key→plaintext. Server base64-encodes before patching.
  string yaml_content = 3;
}

message ApplySecretResponse {
  string resource_version = 1;
}

message SubscribeSecretsRequest {
  string namespace = 1;
  repeated string names = 2;
  string resume_resource_version = 3;
}

message SecretEvent {
  enum EventType {
    ADDED = 0;
    MODIFIED = 1;
    DELETED = 2;
    SNAPSHOT = 3;
  }
  EventType event_type = 1;
  SecretResponse secret = 2;
}

service KonfigService {
  // Get a single config by namespace and name.
  rpc Get(GetRequest) returns (Config);
  // Stream all configs in a namespace (one per cached entry).
  rpc GetAll(GetAllRequest) returns (stream Config);
  // Create or update a config (YAML → CRD patch with schema_version check).
  rpc Apply(ApplyRequest) returns (ApplyResponse);
  // Roll back a Config to a historical resourceVersion.  Looks up the historical
  // content via a K8s list with resourceVersionMatch=Exact, bumps the
  // schema_version above the current value to preserve monotonicity, and
  // re-applies through the standard Apply code path.
  rpc Revert(RevertRequest) returns (RevertResponse);
  // Live config change stream. Pass resume_resource_version to replay missed
  // events on reconnect. Returns RESOURCE_EXHAUSTED if subscriber falls behind
  // the broadcast ring buffer.
  rpc Subscribe(SubscribeRequest) returns (stream ConfigEvent);
  // Get a single secret by namespace and name.
  rpc GetSecret(GetSecretRequest) returns (SecretResponse);
  // Stream all secrets in a namespace.
  rpc GetAllSecrets(GetAllSecretsRequest) returns (stream SecretResponse);
  // Create or update a managed secret (YAML key→plaintext, server base64-encodes).
  rpc ApplySecret(ApplySecretRequest) returns (ApplySecretResponse);
  // Live secret change stream for a managed namespace. Same semantics as
  // Subscribe.
  rpc SubscribeSecrets(SubscribeSecretsRequest) returns (stream SecretEvent);
}
